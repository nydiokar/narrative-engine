# Story Bible Template
# Comprehensive reference document for the narrative.

story_bible:
  title: "<string>"
  premise: "<string>"
  genre: "<string>"
  tone: "<string>"

  actants:
    subject:
      id: "<character_id>"
      name: "<string>"
      description: "<string>"
    object_of_value:
      id: "<object_id>"
      name: "<string>"
      type: "<value_state>"
      description: "<string>"
    sender:
      id: "<character_id>"
      name: "<string>"
      description: "<string>"
    receiver:
      id: "<character_id>"
      name: "<string>"
      description: "<string>"
    helpers:
      - id: "<character_id>"
        name: "<string>"
        modality_provided: "<knowing|being_able>"
    opponents:
      - id: "<character_id>"
        name: "<string>"
        value_logic: "<string>"

  world:
    setting: "<string>"
    rules: ["<string>"]
    atmosphere: "<string>"

  narrative_programs:
    - id: "<np_id>"
      description: "<string>"
      object_of_value: "<value_state>"
      canonical_phases:
        manipulation: "<bool>"
        competence: "<bool>"
        performance: "<bool>"
        sanction: "<bool>"
      initial_state: "<string>"
      terminal_state: "<string>"

  propp_sequence:
    - "<function_symbol>"
