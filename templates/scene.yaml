# Scene Template
# Defines a single scene in the narrative.
# Must pass the 5-question Greimas diagnostic.

scene:
  id: "<uuid>"
  episode_id: "<episode_id>"
  sequence: "<integer>"

  greimas_diagnostic:
    question_1_state_before: "<string>"
    question_2_action_occurs: "<string>"
    question_3_state_after: "<string>"
    question_4_value_object_change: "<increased|decreased|transferred|revealed|corrupted|redefined|none>"
    question_5_future_action_possible_or_blocked: "<string>"
    diagnostic_pass: "<bool>"

  setting:
    location: "<string>"
    time: "<string>"
    atmosphere: "<string>"

  characters_present:
    - character_id: "<uuid>"
      state: "<emotional/physical state>"

  events:
    - sequence: "<integer>"
      description: "<string>"
      causal_predecessor: "<event_id>"
      greimas_operation: "<operation_type>"
      propp_function: "<propp_function_symbol>"

  dialogue:
    - speaker: "<character_id>"
      line: "<string>"
      function: "<narrative_function>"

  modality_changes:
    - actant: "<character_id>"
      modality: "<modality_name>"
      from: "<state>"
      to: "<state>"

  prose: "<full_scene_text>"
  word_count: "<integer>"
  status: "<draft|review|final>"
