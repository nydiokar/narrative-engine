# Proppian Functions
# Based on Vladimir Propp's Morphology of the Folktale (1928).
#
# LAYER NOTE:
# Propp defines the functional SEQUENCE — what kind of story-function happens next.
# Greimas (see /core/greimas/) defines the STRUCTURAL NECESSITY — why this action
# must exist, what value-object is being contested.
#
# Integration: Greimas defines why the narrative movement is necessary.
#              Propp defines one possible morphology of how the movement unfolds.
#
# Propp is excellent for sequence morphology.
# Greimas is better for structural necessity and diagnostic validation.

functions:
  - id: 1
    symbol: α
    name: Absentation
    description: "A member of the family leaves home."

  - id: 2
    symbol: β
    name: Interdiction
    description: "An interdiction is addressed to the hero."

  - id: 3
    symbol: γ
    name: Violation
    description: "The interdiction is violated."

  - id: 4
    symbol: δ
    name: Reconnaissance
    description: "The villain attempts reconnaissance."

  - id: 5
    symbol: ε
    name: Delivery
    description: "The villain gains information about the victim."

  - id: 6
    symbol: ζ
    name: Trickery
    description: "The villain attempts to deceive the victim."

  - id: 7
    symbol: η
    name: Complicity
    description: "The victim is deceived and unwittingly helps the villain."

  - id: 8
    symbol: A
    name: Villainy
    description: "The villain causes harm or injury to a family member."

  - id: 9
    symbol: a
